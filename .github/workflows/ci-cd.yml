name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

env:
  JAVA_VERSION: '17'
  MAVEN_VERSION: '3.9.9'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出主仓库代码（不自动拉 submodule，避免本地改动 commit 不存在于上游）
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 独立 clone 上游 mall-tiny（始终使用公开的 master 分支）
    - name: Clone mall-tiny from upstream
      run: |
        rm -rf mall-tiny
        git clone --depth=1 https://github.com/macrozheng/mall-tiny.git mall-tiny
        echo "mall-tiny cloned, latest commit:"
        git -C mall-tiny log --oneline -1

    # 3. 独立 clone 上游 mall-admin-web
    - name: Clone mall-admin-web from upstream
      run: |
        rm -rf mall-admin-web
        git clone --depth=1 https://github.com/macrozheng/mall-admin-web.git mall-admin-web
        echo "mall-admin-web cloned, latest commit:"
        git -C mall-admin-web log --oneline -1

    # 4. 设置 JDK
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    # 5. 构建后端项目
    - name: Build mall-tiny
      run: |
        cd mall-tiny
        mvn clean package -DskipTests -q
        echo "Build output:"
        ls -la target/*.jar

    # 6. 构建前端项目
    - name: Build mall-admin-web
      run: |
        cd mall-admin-web
        npm install
        npm run build
        echo "Frontend build output:"
        ls -la dist/

    # 5. 上传构建产物
    - name: Upload backend artifact
      uses: actions/upload-artifact@v4
      with:
        name: mall-tiny-jar
        path: mall-tiny/target/*.jar
        retention-days: 7

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: mall-admin-web-dist
        path: mall-admin-web/dist/
        retention-days: 7

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 下载编译产物到 docker 构建上下文
    - name: Download backend artifact
      uses: actions/download-artifact@v4
      with:
        name: mall-tiny-jar
        path: docker/mall-tiny/target/

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: mall-admin-web-dist
        path: docker/mall-admin-web/dist/

    # 6. 设置 Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 7. 登录 Docker Hub（可选）
    - name: Login to Docker Hub
      if: env.DOCKERHUB_USERNAME != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    # 8. 构建 Docker 镜像（使用主仓库 docker/ 目录中的 Dockerfile，避免依赖 submodule）
    - name: Build backend Docker image
      run: |
        echo "=== Building mall-tiny ==="
        ls -la docker/mall-tiny/target/
        docker build -t mall-tiny:${{ github.sha }} -t mall-tiny:latest docker/mall-tiny/
        docker images | grep mall-tiny

    - name: Build frontend Docker image
      run: |
        echo "=== Building mall-admin-web ==="
        ls -la docker/mall-admin-web/dist/
        docker build -t mall-admin-web:${{ github.sha }} -t mall-admin-web:latest docker/mall-admin-web/
        docker images | grep mall-admin-web

  # 注意：本地部署由 Jenkins 负责，GitHub Actions 只负责构建镜像
